version: '3.8'

services:
  # ─── Databases ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: iip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: iip_db
      POSTGRES_USER: iip_user
      POSTGRES_PASSWORD: iip_secret_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iip_user -d iip_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Elasticsearch (Primary search, vector, geospatial) ─────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: iip-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - cluster.name=iip-cluster
      - node.name=iip-node-01
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ─── Neo4j (Knowledge Graph & Graph-RAG) ─────────────────────────────────────
  neo4j:
    image: neo4j:5.18.0-community
    container_name: iip-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/iip_neo4j_password
      - NEO4J_PLUGINS=["apoc","graph-data-science"]
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=512M
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ─── Redis (Session cache, rate limiting, JIT token store) ──────────────────
  redis:
    image: redis:7.2-alpine
    container_name: iip-redis
    restart: unless-stopped
    command: redis-server --requirepass iip_redis_password --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "iip_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka (Async event streaming, audit bus) ────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: iip-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── HashiCorp Vault (Secrets, audit keys, PKI) ──────────────────────────────
  vault:
    image: hashicorp/vault:1.15
    container_name: iip-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "iip-vault-root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    volumes:
      - vault_data:/vault/data
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── OPA (Policy Engine) ─────────────────────────────────────────────────────
  opa:
    image: openpolicyagent/opa:0.63.0
    container_name: iip-opa
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-format=json"
      - "/policies"
    ports:
      - "8181:8181"
    volumes:
      - ./infra/opa/policies:/policies
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8181/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (Object storage for evidence, media artifacts) ───────────────────
  minio:
    image: minio/minio:latest
    container_name: iip-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: iip_minio_user
      MINIO_ROOT_PASSWORD: iip_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
  elasticsearch_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  vault_data:
  minio_data:

networks:
  default:
    name: iip-network
