name: iip_app
description: IIP mobile client for iOS and Android
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  image_picker: ^1.1.2
  crop_your_image: ^2.0.0
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  local_auth: ^2.3.0
  crypto: ^3.0.6
  flutter_native_splash: ^2.4.6
  geolocator: ^13.0.2
  fl_chart: ^0.69.2
  intl: ^0.19.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  camera: ^0.11.0+2
  google_mlkit_face_detection: ^0.13.1
  image: ^4.5.4
  graphview: ^1.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/launcher_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/launcher_icon.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
